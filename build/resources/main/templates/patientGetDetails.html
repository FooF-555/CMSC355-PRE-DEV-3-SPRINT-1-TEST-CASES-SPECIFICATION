<!DOCTYPE html>
<html lang="en">
<html xmlns:th="http://www.thymeleaf.org"></html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Details</title>
    <link rel="stylesheet" href="/css/patientGetDetails.css">
    <!-- <link rel="stylesheet" href="../static/css/patientGetDetails.css"> -->

</head>

<body>
    <label id="detailsBox">
        <label id="detailsTitle">
            Your Details
        </label><br>

        <div id="givenDetails">
           <!-- to be filled-->
            <p class="details">ID - <span class="patientInfo" th:text="${patient.userID}"></span></p>
            <p class="details">First Name - <span class="patientInfo" th:text="${patient.firstName}"></span></p>
            <p class="details">Last Name - <span class="patientInfo" th:text="${patient.lastName}"></span></p>
            <p class="details">Email - <span class="patientInfo" th:text="${patient.email}"></span></p>
            <p class="details">Age - <span class="patientInfo" th:text="${patient.age}"></span></p>
            <p class="details">Gender - <span class="patientInfo" th:text="${patient.gender}"></span></p>
            <p class="details">Date of Birth - <span class="patientInfo" th:text="${patient.dateOfBirth}"></span></p>
            <p class="details">Phone Number - <span class="patientInfo" th:text="${patient.phoneNumber}"></span></p>
            <p class="details">Additional Information - <span class="patientInfo" th:text="${patient.additionalInfo}"></span></p>
        </div>
    </label>

</body>
