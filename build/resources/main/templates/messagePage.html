<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messaging</title>
    <link rel="stylesheet" href="../css/messagePage.css">
    <!-- <link rel="stylesheet" href="../static/css/messagePage.css"> -->

</head>

<body>
    <label id="box">
        <h2>Compose Message</h2>

        <!-- send message -->
        <form action="/sendMessage" id="messageForm" method="post">
            <label class="labels" id="recepientLabel">
                Recepient Address
            </label><br>
            <input type="text" class="inputBoxes" id="recepientInput" name="receiver" placeholder="Enter recipient email"
                th:value="${otherUser}" required>
            <br>
            <label class="labels" id="messageLabel">
                Message
            </label>
            <textarea class="inputBoxes" rows="2" cols="25" id="messageInput" name="content" placeholder="Type message here" required></textarea><br>

            <button id="sendButton" type="submit">
                SEND
            </button>
        </form>
    </label>

    <!-- show conversation if exists -->
    <div id="shownMessages">
        <div id="yourMessagesTitle">
            Your Messages
        </div>
        <div th:if="${messages != null}">
            <div th:each="msg : ${messages}">
                <p>
                    <div id="senderEmail">
                        <b th:text="${msg.senderEmail}"></b>
                    </div>
                    
                    <div id="messageContents">
                        <span  th:text="${msg.content}"></span>
                    </div>
                </p>
            </div>
        </div>
    </div>

</body>
</html>
