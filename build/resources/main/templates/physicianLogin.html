<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physician Login</title>
    <link rel="stylesheet" th:href="@{/css/physicianLogin.css}">
</head>

<body>
    <form th:action="@{/physicianLogin}" id="loginPage" method="post">
        <div id="detailsTitle">
            Physician Login
        </div>

        <div id="loginFormContainer">
            <div class="inputRow">
                <label for="inputUsername" class="inputLabels">Username:</label>
                <input type="text" name="firstName" id="inputUsername" class="inputBoxes" placeholder="Enter email address" required>
            </div>

            <div class="inputRow">
                <label for="inputPassword" class="inputLabels">Password:</label>
                    <input type="password" name="password" id="inputPassword" class="inputBoxes" placeholder="Enter password" minlength="7" required>
            </div>

            <button type="submit" id="loginButton">
                    LOGIN
            </button>
        </div>
    </form>
</body>
</html>
